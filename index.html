  <script>
    // Privacy modal functions
    function showPrivacyModal() {
      const m = document.getElementById('privacyModal');
      const lang = localStorage.getItem('sbti_lang') || 'zh';
      
      if (lang === 'zh') {
        document.getElementById('pmTitle').textContent = '隐私政策';
        document.getElementById('pmContent').innerHTML = `
          <p>• 我们仅收集匿名答题数据，仅用于计算测试结果</p>
          <p>• 数据存储在本地浏览器，不上传服务器</p>
          <p>• 不使用 Cookie，不追踪用户</p>
          <p>• 点击下方按钮可删除所有本地数据</p>
          <button onclick="deleteAllData()" class="mt-2 px-4 py-2 bg-red-500 text-white rounded-full text-sm">删除我的数据</button>
        `;
        document.getElementById('pmCloseBtn').textContent = '关闭';
      } else {
        document.getElementById('pmTitle').textContent = 'Privacy Policy';
        document.getElementById('pmContent').innerHTML = `
          <p>• We only collect anonymous answer data for test results</p>
          <p>• Data is stored locally in your browser, not uploaded</p>
          <p>• No cookies or user tracking</p>
          <p>• Click below to delete all local data</p>
          <button onclick="deleteAllData()" class="mt-2 px-4 py-2 bg-red-500 text-white rounded-full text-sm">Delete My Data</button>
        `;
        document.getElementById('pmCloseBtn').textContent = 'Close';
      }
      
      m.classList.remove('hidden');
      m.classList.add('flex');
    }
    
    function closePrivacyModal() {
      document.getElementById('privacyModal').classList.add('hidden');
      document.getElementById('privacyModal').classList.remove('flex');
    }
    
    function deleteAllData() {
      if (confirm(localStorage.getItem('sbti_lang') === 'zh' ? '确定删除所有数据？' : 'Delete all data?')) {
        localStorage.clear();
        alert(localStorage.getItem('sbti_lang') === 'zh' ? '已删除' : 'Deleted');
        closePrivacyModal();
      }
    }
  </script>
  
  <!-- Service Worker: unregister ALL old, register minimal no-cache SW -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(regs => {
        // Unregister ALL existing service workers
        return Promise.all(regs.map(r => r.unregister()));
      }).then(() => {
        // Clear ALL caches
        if ('caches' in window) {
          return caches.keys().then(names => Promise.all(names.map(n => caches.delete(n))));
        }
      }).then(() => {
        // Register new no-cache SW
        navigator.serviceWorker.register('/sw.js?t=' + Date.now()).catch(() => {});
      });
    }
  </script>
